name: Task 5 - Smart Pipeline

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint
        run: echo "🔍 Linting code..."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: echo "🧪 Running tests..."

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Branch Check
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "✅ Main branch push!"
          else
            echo "🌿 Feature branch push!"
          fi

      - name: Print Commit Message
        run: |
          echo "📝 Commit: ${{ github.event.commits[0].message }}"
